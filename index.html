<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>BookFinder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HERO -->
<section class="hero d-flex align-items-center justify-content-center">
  <div class="container text-center text-white">

    <h1 class="display-4 fw-bold mb-3">Descubra Novos Mundos 📖</h1>
    <p class="lead mb-4">Busque seus livros favoritos</p>

    <!-- BUSCA CENTRAL -->
    <div class="d-flex justify-content-center">
      <div class="input-group search-box">
        <input type="text" id="searchInput" class="form-control" placeholder="Digite o nome do livro...">
        <button class="btn btn-warning" onclick="buscarLivros()">Buscar</button>
      </div>
    </div>

  </div>
</section>

<!-- RESULTADOS -->
<div class="container my-5">

  <div id="loading" class="text-center d-none">
    <div class="spinner-border text-warning"></div>
    <p>Carregando...</p>
  </div>

  <div id="erro" class="alert alert-danger d-none"></div>

  <div id="resultado" class="row"></div>

</div>

<script src="js/script.js"></script>
</body>
</html>
